<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamino - Pasarela de Pago</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/pago.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <header>
        <a href="index.html" class="logo">Kami<span>no</span></a>
        <nav>
            <div id="auth-container">
                <a href="mis_compras.html" id="nav-mis-compras" style="display: none;">Mis Compras</a>
                <a href="login.html" id="btn-login">Iniciar Sesión</a>
            </div>
        </nav>
    </header>
    <main class="main-content">
    <div class="pago-container">
        <h2>Detalle de tu Pago</h2>
        
        <div class="resumen-viaje">
            <p><strong>Pasajero:</strong> <span id="txt-usuario">...</span></p>
            <p><strong>Asientos seleccionados:</strong> <span id="txt-asientos" style="color: #007bff; font-weight: bold;">...</span></p>
        </div>

        <form id="form-pago">
            <div class="form-group">
                <label>MÉTODO DE PAGO</label>
                    <select id="metodo_pago" required>
                        <option value="tarjeta">Tarjeta de Crédito / Débito</option>
                        <option value="transferencia">Transferencia Bancaria</option>
                        <option value="yape_plin">Yape / Plin</option>
                    </select>
                <button type="submit" class="btn-pagar">Confirmar y Pagar Pasaje</button>
            </div>
        </form>
    </div>
    </main>
    <script>
        // Función para liberar asientos al salir de la página de pago
        async function liberarAsientos() {
            const usuario = JSON.parse(localStorage.getItem('usuario_logueado'));
            if (usuario) {
                await fetch('http://localhost:3000/api/bloquear-asientos/liberar', {
                    method: 'POST', // O DELETE, según prefieras
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_usuario: usuario.id_usuario })
                });
            }
        }

        // Escuchar cuando el usuario navega fuera de la página
        window.addEventListener("beforeunload", () => {
            liberarAsientos();
        });
    </script>
    <script src="js/pago.js"></script>
    <script src="js/header.js"></script>
</body>
</html>
